services:
  - type: web
    name: ai-fishing-game-mcp
    runtime: python
    plan: free
    buildCommand: ""           # 零依赖，无需安装任何东西
    startCommand: python server.py
    envVars:
      - key: MCP_AUTH_TOKEN     # 在 Render 控制台手动填一个随机长字符串
        sync: false
      - key: DATA_DIR
        value: ./data           # 免费版无持久磁盘：存档落临时目录，休眠/重部署会重置
